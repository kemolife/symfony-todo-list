
services:
###> doctrine/doctrine-bundle ###
  database:
    ports:
      - "5432:5432"
###< doctrine/doctrine-bundle ###

###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###< symfony/mailer ###

###> symfony/messenger ###
  rabbitmq:
     ports:
       - "5672:5672"
       - "15672:15672"
###< symfony/messenger ###

###< symfony/backend ###
  backend:
    volumes:
      - ./backend/src:/app/src
      - ./backend/config:/app/config
      - ./backend/migrations:/app/migrations
      - ./backend/public:/app/public
      - ./backend/templates:/app/templates
      - ./backend/bin:/app/bin
      - ./backend/var:/app/var
###< symfony/backend ###

###< symfony/messeger-cosumer ###
  messenger:
    volumes:
      - ./backend/src:/app/src
      - ./backend/config:/app/config
      - ./backend/var:/app/var
###< symfony/messeger-cosumer ###

###< react/frontend ###
  frontend:
    environment:
      CHOKIDAR_USEPOLLING: "1"
    volumes:
      - ./frontend:/app
      - /app/node_modules
###< react/frontend ###
