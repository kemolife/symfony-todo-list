apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailpit
  template:
    metadata:
      labels:
        app: mailpit
    spec:
      containers:
        - name: mailpit
          image: axllent/mailpit:v1.21
          ports:
            - containerPort: 1025
            - containerPort: 8025
          livenessProbe:
            httpGet:
              path: /
              port: 8025
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8025
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 32m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
