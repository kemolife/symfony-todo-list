apiVersion: apps/v1
kind: Deployment
metadata:
  name: messenger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: messenger
  template:
    metadata:
      labels:
        app: messenger
    spec:
      containers:
        - name: messenger
          image: ghcr.io/owner/backend:latest
          command:
            - php
            - bin/console
            - messenger:consume
            - async
            - --time-limit=3600
            - -vv
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: 128m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
