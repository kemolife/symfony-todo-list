# After `terraform output`, replace placeholder hostnames with real endpoints:
#   postgres:  module.rds.endpoint
#   redis:     module.elasticache.endpoint
#   rabbitmq:  module.mq.endpoint
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  type: ExternalName
  externalName: REPLACE_WITH_RDS_ENDPOINT
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  type: ExternalName
  externalName: REPLACE_WITH_ELASTICACHE_ENDPOINT
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
spec:
  type: ExternalName
  externalName: REPLACE_WITH_AMAZONMQ_ENDPOINT
