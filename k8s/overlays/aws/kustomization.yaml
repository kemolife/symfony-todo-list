apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - backend-service-account.yaml
images:
  - name: ghcr.io/owner/backend
    newName: REPLACE_WITH_BACKEND_ECR
    newTag: latest
  - name: ghcr.io/owner/frontend
    newName: REPLACE_WITH_FRONTEND_ECR
    newTag: latest
patches:
  # Remove in-cluster workloads (managed services replace them)
  - path: patches/remove-postgres-statefulset.yaml
  - path: patches/remove-postgres-pvc.yaml
  - path: patches/remove-rabbitmq-statefulset.yaml
  - path: patches/remove-redis-deployment.yaml
  # Patch services to ExternalName pointing at managed AWS endpoints
  - target:
      kind: Service
      name: postgres
    patch: |
      - op: replace
        path: /spec/type
        value: ExternalName
      - op: add
        path: /spec/externalName
        value: REPLACE_WITH_RDS_ENDPOINT
      - op: remove
        path: /spec/selector
      - op: remove
        path: /spec/clusterIP
  - target:
      kind: Service
      name: redis
    patch: |
      - op: replace
        path: /spec/type
        value: ExternalName
      - op: add
        path: /spec/externalName
        value: REPLACE_WITH_ELASTICACHE_ENDPOINT
      - op: remove
        path: /spec/selector
  # Attach IRSA ServiceAccount to backend and messenger (grants SQS access)
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: add
        path: /spec/template/spec/serviceAccountName
        value: backend
  - target:
      kind: Deployment
      name: messenger
    patch: |
      - op: add
        path: /spec/template/spec/serviceAccountName
        value: backend
