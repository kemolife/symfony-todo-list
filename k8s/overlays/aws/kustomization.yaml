apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  # Remove in-cluster workloads (managed services replace them)
  - path: patches/remove-postgres-statefulset.yaml
  - path: patches/remove-postgres-pvc.yaml
  - path: patches/remove-rabbitmq-statefulset.yaml
  - path: patches/remove-redis-deployment.yaml
  # Patch services to ExternalName pointing at managed AWS endpoints
  - target:
      kind: Service
      name: postgres
    patch: |
      - op: replace
        path: /spec/type
        value: ExternalName
      - op: add
        path: /spec/externalName
        value: REPLACE_WITH_RDS_ENDPOINT
      - op: remove
        path: /spec/selector
      - op: remove
        path: /spec/clusterIP
  - target:
      kind: Service
      name: redis
    patch: |
      - op: replace
        path: /spec/type
        value: ExternalName
      - op: add
        path: /spec/externalName
        value: REPLACE_WITH_ELASTICACHE_ENDPOINT
      - op: remove
        path: /spec/selector
  - target:
      kind: Service
      name: rabbitmq
    patch: |
      - op: replace
        path: /spec/type
        value: ExternalName
      - op: add
        path: /spec/externalName
        value: REPLACE_WITH_AMAZONMQ_ENDPOINT
      - op: remove
        path: /spec/selector
